    <style>
  body {
    height: 2000px; /* just to show scrolling underneath */
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* Example content */
  .content {
    padding: 40px;
  }

  /* Moving image */
  .floating-image {
    position: fixed;        /* stays on top of everything */
    top: 50%;
    left: -150px;           /* start off-screen */
    transform: translateY(-50%);
    z-index: 9999;          /* ensures it's above all elements */
    width: 120px;
    pointer-events: none;   /* allows clicks through it */

    animation: moveAcross 8s linear infinite;
  }

  @keyframes moveAcross {
    0% {
      left: -150px;
    }
    100% {
      left: 110%;
    }
  }
</style>
