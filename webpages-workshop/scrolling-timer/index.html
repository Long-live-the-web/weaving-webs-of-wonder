<!DOCTYPE html>
<html>
  <head>
    <title>STOP SCROLLING</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 id="title" class="title">do you want to stop scrolling?</h1>
        <h1 id="no-text" class="no-text">ok</h1>

    <input onclick="changeTextYes()" type="button" value="yes" id="yes-btn">
    <input onclick="changeTextNo()" type="button" value="no" id="no-btn">


    <p class="timer" id="demo"></p>
      
      <script>
        var sec = 30;
        var timer = setInterval(function(){
                    document.getElementById('demo').innerHTML='00:'+sec;
                    sec--;
                    if (sec < 0) {
                        clearInterval(timer);
                    }
                }, 1000);
      </script>
      
      <script src="script.js"></script>

  </body>
</html>
